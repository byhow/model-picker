name: Test & Coverage

on:
  push:
    branches:
      - main
      - '*.feature/**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install

      - name: Test with coverage
        run: |
          set -o pipefail
          bun test --coverage 2>&1 | tee /tmp/bun-coverage.txt

      - name: Check coverage threshold
        run: |
          COVERAGE=$(grep "All files" /tmp/bun-coverage.txt | awk '{print $6}' | tr -d '%')
          echo "Coverage: $COVERAGE%"
          # CLI subprocess tests are skipped in CI due to Bun posix_spawn bug (oven-sh/bun#24012)
          if (( $(echo "$COVERAGE < 85" | bc -l) )); then
            echo "ERROR: Coverage $COVERAGE% is below 85% threshold"
            exit 1
          fi
          echo "Coverage check passed!"
