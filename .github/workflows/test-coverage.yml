name: Test & Coverage

on:
  push:
    branches:
      - main
      - '*.feature/**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install

      - name: Test with coverage
        run: |
          # Ensure bun is in PATH for spawned subprocesses
          export PATH="$HOME/.bun/bin:$PATH"
          bun test --coverage

      - name: Check coverage threshold
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          COVERAGE=$(bun test --coverage 2>&1 | grep "All files" | awk '{print $6}' | tr -d '%')
          echo "Coverage: $COVERAGE%"
          # Note: Some tests are skipped in CI due to Bun.spawn limitations
          if (( $(echo "$COVERAGE < 89" | bc -l) )); then
            echo "ERROR: Coverage $COVERAGE% is below 89% threshold"
            exit 1
          fi
          echo "Coverage check passed!"
