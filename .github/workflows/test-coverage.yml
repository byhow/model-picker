name: Test & Coverage

on:
  push:
    branches:
      - main
      - '*.feature/**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install

      - name: Test with coverage
        run: bun test --coverage

      - name: Check coverage threshold
        run: |
          COVERAGE=$(bun test --coverage 2>&1 | grep "All files" | awk '{print $6}' | tr -d '%')
          echo "Coverage: $COVERAGE%"
          # Allow slightly lower threshold in CI (89.5%) since CLI integration tests are skipped
          if (( $(echo "$COVERAGE < 89.5" | bc -l) )); then
            echo "ERROR: Coverage $COVERAGE% is below 89.5% threshold"
            exit 1
          fi
          echo "Coverage check passed!"
